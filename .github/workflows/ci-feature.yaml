name: CI - Feature

on:
  workflow_dispatch:  # manual trigger via GitHub Actions UI

  # push:
  #   branches-ignore:
  #     - main

jobs:
  # ─── STAGE 1 (parallel) ───────────────────────────────────────────────────

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l -e .)
          if [ -n "$unformatted" ]; then
            echo "These files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0  # full history so gitleaks scans all commits in the push

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── STAGE 2 ──────────────────────────────────────────────────────────────

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint-format, secret-scan]  # only runs if stage 1 fully passes

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./internal/... -v -race -count=1