name: CI - Main

on:
  push:
    branches:
      - main

jobs:
  # ─── STAGE 1 (parallel) ───────────────────────────────────────────────────

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l -e .)
          if [ -n "$unformatted" ]; then
            echo "These files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: go build ./cmd/server/...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./internal/... -v -race -count=1

  # ─── STAGE 2 (parallel) ───────────────────────────────────────────────────

  sca:
    name: SCA - Dependency Vulnerabilities
    runs-on: ubuntu-latest
    needs: [lint-format, secret-scan, build-check, unit-tests]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  sast:
    name: SAST - Static Security Analysis
    runs-on: ubuntu-latest
    needs: [lint-format, secret-scan, build-check, unit-tests]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -exclude-generated ./...

  # ─── STAGE 3 ──────────────────────────────────────────────────────────────

  build-and-stage:
    name: Build & Stage Image (ghcr.io)
    runs-on: ubuntu-latest
    needs: [sca, sast]
    permissions:
      contents: read
      packages: write
    outputs:
      staged-image: ${{ steps.image-ref.outputs.ref }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ghcr.io (staging)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Extract single image ref for scanning
        id: image-ref
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "ref=ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

  # ─── STAGE 4 ──────────────────────────────────────────────────────────────

  scan-image:
    name: Scan Image for CVEs
    runs-on: ubuntu-latest
    needs: [build-and-stage]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-stage.outputs.staged-image }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  # ─── STAGE 5 ──────────────────────────────────────────────────────────────

  push-and-sign:
    name: Push & Sign Image (Docker Hub)
    runs-on: ubuntu-latest
    needs: [scan-image, build-and-stage]
    permissions:
      id-token: write
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/product-catalog-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push scanned image to Docker Hub
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ secrets.DOCKERHUB_USERNAME }}/product-catalog-service@${{ steps.push.outputs.digest }}

  # ─── STAGE 6 ──────────────────────────────────────────────────────────────

  deploy-kind:
    name: Deploy to kind
    runs-on: ubuntu-latest
    needs: [push-and-sign, build-and-stage]
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v5

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Create kind cluster
        run: kind create cluster --name ci --wait 60s

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and load service image into kind
        run: |
          docker pull ${{ needs.build-and-stage.outputs.staged-image }}
          kind load docker-image ${{ needs.build-and-stage.outputs.staged-image }} --name ci

      - name: Pull and load postgres image into kind
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/product-catalog-db:latest
          kind load docker-image ${{ secrets.DOCKERHUB_USERNAME }}/product-catalog-db:latest --name ci

      - name: Create namespace
        run: |
          kubectl apply -f ci/k8s/namespace.yaml

      - name: Create secrets
        run: |
          kubectl create secret generic postgres-credentials \
            --from-literal=POSTGRES_DB=product_catalog \
            --from-literal=POSTGRES_USER=catalog_user \
            --from-literal=POSTGRES_PASSWORD=catalog_pass \
            -n ci-test

          kubectl create secret generic product-catalog-secrets \
            --from-literal=DATABASE_URL=postgresql://catalog_user:catalog_pass@postgres:5432/product_catalog \
            -n ci-test

      - name: Apply manifests
        env:
          SERVICE_IMAGE: ${{ needs.build-and-stage.outputs.staged-image }}
          DB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/product-catalog-db:latest
        run: |
          envsubst < ci/k8s/product-catalog-db.yaml | kubectl apply -f -
          envsubst < ci/k8s/product-catalog-service.yaml | kubectl apply -f -

      - name: Wait for postgres ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=postgres \
            -n ci-test \
            --timeout=120s

      - name: Wait for service ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=product-catalog-service \
            -n ci-test \
            --timeout=120s

  # ─── STAGE 7 — Smoke Test ─────────────────────────────────────────────────

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-kind]

    steps:
      - name: Install grpcurl
        run: |
          curl -sSL https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin grpcurl

      - name: Port forward service
        run: |
          kubectl port-forward svc/product-catalog-service 3550:3550 -n platform-demo &
          sleep 3   # give port-forward time to establish

      - name: Health check
        run: |
          response=$(grpcurl -plaintext localhost:3550 grpc.health.v1.Health/Check)
          status=$(echo "$response" | grep -o '"status": "[^"]*"' | cut -d'"' -f4)
          if [ "$status" != "SERVING" ]; then
            echo "FAIL: expected SERVING, got $status"
            exit 1
          fi
          echo "PASS: service is SERVING"

  # ─── STAGE 8 — E2E Tests ──────────────────────────────────────────────────

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [smoke-test]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Port forward service
        run: |
          kubectl port-forward svc/product-catalog-service 3550:3550 -n platform-demo &
          sleep 3

      - name: Run e2e tests
        run: go test -tags e2e ./tests/e2e/... -v -timeout 60s

  # ─── STAGE 9 — Load Test ──────────────────────────────────────────────────

  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    needs: [e2e-tests]

    steps:
      - uses: actions/checkout@v5

      - name: Install ghz
        run: |
          curl -sSL https://github.com/bojand/ghz/releases/download/v0.120.0/ghz-linux-x86_64.tar.gz \
            | tar -xz -C /usr/local/bin ghz

      - name: Port forward service
        run: |
          kubectl port-forward svc/product-catalog-service 3550:3550 -n platform-demo &
          sleep 3

      - name: Run load test
        run: |
          ghz --insecure \
            --proto proto/productcatalog.proto \
            --call hipstershop.ProductCatalogService/ListProducts \
            --rps 1000 \
            -z 30s \
            -c 10 \
            --output json \
            -O /tmp/ghz-result.json \
            localhost:3550

      - name: Check load test thresholds
        run: |
          ERROR_RATE=$(jq '.errorRate' /tmp/ghz-result.json)
          P99=$(jq '.latencyDistribution[] | select(.percentage == 99) | .latency' /tmp/ghz-result.json)
          P99_MS=$(echo "$P99 / 1000000" | bc)

          echo "Error rate: $ERROR_RATE"
          echo "p99 latency: ${P99_MS}ms"

          # fail if error rate > 1%
          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "FAIL: error rate ${ERROR_RATE} exceeds 1%"
            exit 1
          fi

          # fail if p99 > 200ms
          if (( P99_MS > 200 )); then
            echo "FAIL: p99 latency ${P99_MS}ms exceeds 200ms"
            exit 1
          fi

          echo "PASS: error rate=${ERROR_RATE} p99=${P99_MS}ms"

  # ─── STAGE 10 — Teardown (always runs) ────────────────────────────────────

  teardown:
    name: Teardown kind
    runs-on: ubuntu-latest
    needs: [smoke-test, e2e-tests, load-test]
    if: always()    # always run even if previous stages failed

    steps:
      - name: Delete kind cluster
        run: kind delete cluster --name ci